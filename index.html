<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Expense Tracker</h2>

    <h3>Balance: ₹<span id="balance">0</span></h3>

    <div class="inc-exp">
      <div>
        <h4>Income</h4>
        <p id="money-plus">+₹0</p>
      </div>
      <div>
        <h4>Expense</h4>
        <p id="money-minus">-₹0</p>
      </div>
    </div>

    <h3>History</h3>
    <ul id="list"></ul>

    <h3>Add Transaction</h3>
    <form id="form">
      <input type="text" id="text" placeholder="Enter description" required>
      <input type="number" id="amount" placeholder="Enter amount (+income, -expense)" required>
      <button>Add</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
